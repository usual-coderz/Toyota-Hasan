<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* --- LOGIN PAGE --- */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .login-container h1 {
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
            color: #1a1a2e;
        }
        .login-container .input-group {
            margin-bottom: 16px;
        }
        .login-container .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .login-container .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-container .input-group input:focus {
            border-color: #667eea;
        }
        .login-container .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        .login-container .login-btn:hover {
            transform: translateY(-2px);
        }
        .login-error {
            color: #C62828;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        /* --- ADMIN PANEL --- */
        .admin-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
            display: none;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e0e0e0;
        }
        .admin-header h1 {
            font-size: 22px;
            color: #1a1a2e;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-right .logged-as {
            font-size: 13px;
            color: #888;
        }
        .header-right .logged-as strong {
            color: #1a1a2e;
        }
        .header-right .logout-btn {
            padding: 8px 18px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            transition: background 0.2s;
        }
        .header-right .logout-btn:hover {
            background: #ccc;
        }

        /* --- POST FORM --- */
        .post-form {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 32px;
        }
        .post-form h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        .post-form input[type="text"],
        .post-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .post-form input:focus,
        .post-form textarea:focus {
            border-color: #667eea;
        }
        .post-form textarea {
            min-height: 140px;
            resize: vertical;
        }
        .post-form .form-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .post-form .form-row .publish-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .post-form .form-row .publish-btn:hover {
            transform: translateY(-2px);
        }
        .post-form .form-row .cancel-btn {
            padding: 12px 20px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }
        .post-form .form-row .cancel-btn:hover {
            background: #e0e0e0;
        }
        .form-status {
            font-size: 14px;
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            display: none;
        }
        .form-status.show { display: block; }
        .form-status.success { background: #E8F5E9; color: #2E7D32; }
        .form-status.error { background: #FFEBEE; color: #C62828; }

        /* --- POSTS LIST --- */
        .posts-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a1a2e;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 15px;
        }
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 16px;
            transition: box-shadow 0.2s;
        }
        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .post-card .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .post-card .post-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .post-card .post-date {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            margin-left: 16px;
            margin-top: 4px;
        }
        .post-card .post-content {
            font-size: 15px;
            color: #444;
            line-height: 1.7;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-card .post-actions {
            display: flex;
            gap: 8px;
        }
        .post-card .post-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .post-card .post-actions button:active {
            transform: scale(0.96);
        }
        .post-card .post-actions .edit-btn {
            background: #E3F2FD;
            color: #1565C0;
        }
        .post-card .post-actions .edit-btn:hover {
            background: #BBDEFB;
        }
        .post-card .post-actions .delete-btn {
            background: #FFEBEE;
            color: #C62828;
        }
        .post-card .post-actions .delete-btn:hover {
            background: #FFCDD2;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .login-container {
                margin: 40px 16px;
                padding: 28px 20px;
            }
            .admin-container {
                padding: 16px;
            }
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .post-card .post-meta {
                flex-direction: column;
            }
            .post-card .post-date {
                margin-left: 0;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="login-container">
    <h1>Sign In</h1>
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Your username" autocomplete="off" />
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Your password" />
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError">Invalid credentials. Try again.</div>
    <p style="margin-top:20px; font-size:12px; color:#bbb; text-align:center;">
        Only authorized users can access this panel.
    </p>
</div>

<!-- ==================== ADMIN DASHBOARD ==================== -->
<div id="adminPanel" class="admin-container">
    <div class="admin-header">
        <h1>My Dashboard</h1>
        <div class="header-right">
            <span class="logged-as">Logged in as <strong id="displayUser"></strong></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- POST FORM -->
    <div class="post-form">
        <h2 id="formTitle">New Post</h2>
        <input type="text" id="postTitle" placeholder="Post title" />
        <textarea id="postContent" placeholder="Write your content here..."></textarea>
        <div class="form-row">
            <button class="publish-btn" id="publishBtn">Publish</button>
            <button class="cancel-btn" id="cancelEditBtn">Cancel</button>
        </div>
        <div class="form-status" id="formStatus"></div>
    </div>

    <!-- POSTS LIST -->
    <div class="posts-section">
        <h2>All Posts</h2>
        <div id="postsList"></div>
    </div>
</div>

<script>
// ============================================================
// SINGLE-FILE CMS — Only you can post
// ============================================================

// --- CONFIGURATION (CHANGE THESE) ---
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'yourpassword123';

// --- STATE ---
let posts = [];
let editingId = null;
let isLoggedIn = false;

// --- DOM REFS ---
const loginScreen = document.getElementById('loginScreen');
const adminPanel = document.getElementById('adminPanel');
const loginUser = document.getElementById('loginUser');
const loginPass = document.getElementById('loginPass');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const displayUser = document.getElementById('displayUser');
const logoutBtn = document.getElementById('logoutBtn');
const formTitle = document.getElementById('formTitle');
const postTitle = document.getElementById('postTitle');
const postContent = document.getElementById('postContent');
const publishBtn = document.getElementById('publishBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const formStatus = document.getElementById('formStatus');
const postsList = document.getElementById('postsList');

// ============================================================
// LOCAL STORAGE HELPERS
// ============================================================
function loadPosts() {
    try {
        const data = localStorage.getItem('my_posts');
        posts = data ? JSON.parse(data) : [];
    } catch (e) {
        posts = [];
    }
}

function savePosts() {
    localStorage.setItem('my_posts', JSON.stringify(posts));
}

function loadSession() {
    try {
        const session = localStorage.getItem('my_session');
        if (session === ADMIN_USER) {
            isLoggedIn = true;
        }
    } catch (e) {
        // ignore
    }
}

function saveSession() {
    localStorage.setItem('my_session', ADMIN_USER);
}

function clearSession() {
    localStorage.removeItem('my_session');
}

// ============================================================
// UI HELPERS
// ============================================================
function showLogin() {
    loginScreen.style.display = 'block';
    adminPanel.style.display = 'none';
}

function showAdmin() {
    loginScreen.style.display = 'none';
    adminPanel.style.display = 'block';
}

function setFormStatus(msg, type) {
    formStatus.textContent = msg;
    formStatus.className = 'form-status show ' + type;
    setTimeout(() => {
        formStatus.className = 'form-status';
    }, 4000);
}

function resetForm() {
    postTitle.value = '';
    postContent.value = '';
    editingId = null;
    formTitle.textContent = 'New Post';
    publishBtn.textContent = 'Publish';
    cancelEditBtn.style.display = 'none';
}

function populateForm(id) {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    postTitle.value = post.title;
    postContent.value = post.content;
    editingId = id;
    formTitle.textContent = 'Edit Post';
    publishBtn.textContent = 'Update';
    cancelEditBtn.style.display = 'inline-block';
    postTitle.focus();
}

// ============================================================
// RENDER POSTS
// ============================================================
function renderPosts() {
    if (posts.length === 0) {
        postsList.innerHTML = `
            <div class="empty-state">
                <p style="font-size: 40px; margin-bottom: 12px;">📝</p>
                <p>No posts yet. Write your first one above.</p>
            </div>
        `;
        return;
    }

    // Show newest first
    const sorted = [...posts].sort((a, b) => b.createdAt - a.createdAt);

    let html = '';
    for (const post of sorted) {
        const date = new Date(post.createdAt).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
        html += `
            <div class="post-card" data-id="${post.id}">
                <div class="post-meta">
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-date">${date}</div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-actions">
                    <button class="edit-btn" onclick="editPost('${post.id}')">Edit</button>
                    <button class="delete-btn" onclick="deletePost('${post.id}')">Delete</button>
                </div>
            </div>
        `;
    }
    postsList.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================================
// CRUD OPERATIONS
// ============================================================
function createPost(title, content) {
    const post = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        title: title.trim(),
        content: content.trim(),
        createdAt: Date.now(),
        updatedAt: Date.now(),
    };
    posts.push(post);
    savePosts();
    renderPosts();
    resetForm();
    setFormStatus('Post published successfully.', 'success');
}

function updatePost(id, title, content) {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    post.title = title.trim();
    post.content = content.trim();
    post.updatedAt = Date.now();
    savePosts();
    renderPosts();
    resetForm();
    setFormStatus('Post updated successfully.', 'success');
}

function deletePost(id) {
    if (!confirm('Delete this post permanently?')) return;
    posts = posts.filter(p => p.id !== id);
    savePosts();
    renderPosts();
    if (editingId === id) resetForm();
}

function editPost(id) {
    populateForm(id);
    adminPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Make editPost/deletePost globally accessible
window.editPost = editPost;
window.deletePost = deletePost;

// ============================================================
// EVENT HANDLERS
// ============================================================

// --- LOGIN ---
loginBtn.addEventListener('click', function() {
    const user = loginUser.value.trim();
    const pass = loginPass.value.trim();

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
        isLoggedIn = true;
        saveSession();
        displayUser.textContent = user;
        showAdmin();
        initApp();
        loginError.style.display = 'none';
        loginUser.value = '';
        loginPass.value = '';
    } else {
        loginError.style.display = 'block';
        loginPass.value = '';
        loginPass.focus();
    }
});

// Enter key on password field
loginPass.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginBtn.click();
});
loginUser.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginPass.focus();
});

// --- LOGOUT ---
logoutBtn.addEventListener('click', function() {
    isLoggedIn = false;
    clearSession();
    resetForm();
    showLogin();
});

// --- PUBLISH / UPDATE ---
publishBtn.addEventListener('click', function() {
    const title = postTitle.value.trim();
    const content = postContent.value.trim();

    if (!title) {
        setFormStatus('Please enter a title.', 'error');
        postTitle.focus();
        return;
    }
    if (!content) {
        setFormStatus('Please write some content.', 'error');
        postContent.focus();
        return;
    }

    if (editingId) {
        updatePost(editingId, title, content);
    } else {
        createPost(title, content);
    }
});

// --- CANCEL EDIT ---
cancelEditBtn.addEventListener('click', resetForm);

// ============================================================
// INIT
// ============================================================
function initApp() {
    loadPosts();
    renderPosts();
    resetForm();
}

// Check existing session on load
loadSession();
if (isLoggedIn) {
    displayUser.textContent = ADMIN_USER;
    showAdmin();
    initApp();
} else {
    showLogin();
}
</script>
</body>
</html>
